name: Android APK Release

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: android-release-${{ github.ref }}
  cancel-in-progress: false

env:
  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      ANDROID_API_LEVEL: '36'
      ANDROID_BUILD_TOOLS: '36.0.0'
      ANDROID_NDK_VERSION: '27.2.12479018'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch tags
        run: git fetch --force --tags

      - name: Determine next release version
        id: version
        shell: bash
        run: |
          set -euo pipefail
          latest_tag="$(git tag -l 'v0.0.*' --sort=-v:refname | head -n 1)"

          if [[ -z "$latest_tag" ]]; then
            next_patch=1
          else
            latest_patch="${latest_tag##*.}"
            next_patch=$((latest_patch + 1))
          fi

          next_tag="v0.0.${next_patch}"
          apk_name="fastgtrack-${next_tag}.apk"

          echo "latest_tag=${latest_tag}" >> "$GITHUB_OUTPUT"
          echo "next_tag=${next_tag}" >> "$GITHUB_OUTPUT"
          echo "apk_name=${apk_name}" >> "$GITHUB_OUTPUT"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: . -> target
          key: android-release-aarch64

      - name: Cache cargo-apk
        id: cargo-apk-cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/cargo-apk
            ~/.cargo/.crates2.json
            ~/.cargo/.crates.toml
          key: ${{ runner.os }}-cargo-apk-v0.10.0

      - name: Install cargo-apk
        if: steps.cargo-apk-cache.outputs.cache-hit != 'true'
        run: cargo install cargo-apk --locked --version 0.10.0

      - name: Set up Android SDK and NDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK packages
        id: android-sdk-cache
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/platform-tools
            ${{ env.ANDROID_SDK_ROOT }}/platforms/android-${{ env.ANDROID_API_LEVEL }}
            ${{ env.ANDROID_SDK_ROOT }}/build-tools/${{ env.ANDROID_BUILD_TOOLS }}
            ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
            ${{ env.ANDROID_SDK_ROOT }}/licenses
          key: ${{ runner.os }}-android-sdk-${{ env.ANDROID_API_LEVEL }}-${{ env.ANDROID_BUILD_TOOLS }}-${{ env.ANDROID_NDK_VERSION }}

      - name: Install Android packages
        shell: bash
        run: |
          set -euo pipefail

          packages_to_install=()

          [[ -d "${ANDROID_SDK_ROOT}/platform-tools" ]] || packages_to_install+=("platform-tools")
          [[ -d "${ANDROID_SDK_ROOT}/platforms/android-${ANDROID_API_LEVEL}" ]] || packages_to_install+=("platforms;android-${ANDROID_API_LEVEL}")
          [[ -d "${ANDROID_SDK_ROOT}/build-tools/${ANDROID_BUILD_TOOLS}" ]] || packages_to_install+=("build-tools;${ANDROID_BUILD_TOOLS}")
          [[ -d "${ANDROID_SDK_ROOT}/ndk/${ANDROID_NDK_VERSION}" ]] || packages_to_install+=("ndk;${ANDROID_NDK_VERSION}")

          if [[ "${#packages_to_install[@]}" -gt 0 ]]; then
            sdkmanager --install "${packages_to_install[@]}"
          else
            echo "Android SDK packages already restored from cache."
          fi

      - name: Validate Android signing secrets
        shell: bash
        run: |
          set -euo pipefail

          missing=0
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [[ -z "${!name:-}" ]]; then
              echo "Fehlendes GitHub Secret: $name" >&2
              missing=1
            fi
          done

          if [[ "$missing" -ne 0 ]]; then
            echo "Lege einen persistenten Release-Keystore in den Repository-Secrets ab, damit APK-Updates installierbar bleiben." >&2
            exit 1
          fi

      - name: Restore persistent release keystore
        id: keystore
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p "$RUNNER_TEMP/android-signing"
          keystore_path="$RUNNER_TEMP/android-signing/fastgtrack-release.keystore"

          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$keystore_path"

          if [[ ! -s "$keystore_path" ]]; then
            echo "Der Release-Keystore konnte nicht aus ANDROID_KEYSTORE_BASE64 wiederhergestellt werden." >&2
            exit 1
          fi

          echo "keystore_path=$keystore_path" >> "$GITHUB_OUTPUT"

      - name: Build release APK
        env:
          ANDROID_HOME: ${{ env.ANDROID_SDK_ROOT }}
          ANDROID_NDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}/ndk/${{ env.ANDROID_NDK_VERSION }}
          JAVA_HOME: ${{ env.JAVA_HOME }}
          CARGO_APK_RELEASE_KEYSTORE: ${{ steps.keystore.outputs.keystore_path }}
          CARGO_APK_RELEASE_KEYSTORE_PASSWORD: ${{ env.ANDROID_KEYSTORE_PASSWORD }}
          CARGO_APK_RELEASE_KEY_ALIAS: ${{ env.ANDROID_KEY_ALIAS }}
          CARGO_APK_RELEASE_KEY_PASSWORD: ${{ env.ANDROID_KEY_PASSWORD }}
        shell: bash
        run: |
          set -euo pipefail
          cargo apk build --lib --target aarch64-linux-android --release

      - name: Locate APK
        id: apk
        shell: bash
        run: |
          set -euo pipefail
          apk_path="$(find target -type f -name '*.apk' | sort | tail -n 1)"

          if [[ -z "$apk_path" ]]; then
            echo "Keine APK gefunden." >&2
            exit 1
          fi

          release_apk="release/${{ steps.version.outputs.apk_name }}"
          mkdir -p release
          cp "$apk_path" "$release_apk"

          echo "apk_path=${release_apk}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.next_tag }}
          name: ${{ steps.version.outputs.next_tag }}
          generate_release_notes: true
          files: ${{ steps.apk.outputs.apk_path }}
          target_commitish: ${{ github.sha }}
